<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="box">
      <h1 class="header">Change Color</h1>
      <div class="cell">
        <button id="random" class="btn">Random color</button>
        <input

          type="text"
          placeholder="enter the coler name" />
        <button class="apply-btn btn">Apply color</button>
      </div>
      <p class="display">Apply the current color : <span id="text">color</span></p>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
